enum PlantSizeUnit {
  m
  cm
  in
  ft
}

type PlantSize {
  amount: Int
  unit: PlantSizeUnit
}

type PlantData {
  scientificName: String!
  commonNames: [String]
  bloomColors: [String]
  bloomTimes: [String]
  isPerennial: Boolean
  maturityTime: String

  habitat: String
  soilTypes: [String]
  lightLevels: [String]
  hardiness: [Int]
  height: PlantSize
  spread: PlantSize
  uses: [String]

  occurrenceCoords: [[Int]]
  mediaUrls: [String]
}

enum SearchRecordStatus {
  SCRAPING
  DONE
}

type SearchRecord {
  jsonStringSearch: String!
  pageSize: Int!
  lastPageSearched: Int!
  hasNextPage: Boolean!
  uniqueOccurrences: Int!
  status: SearchRecordStatus!
}

scalar JSON

type Query {
  plants(limit: Int, skip: Int, where: JSON): [PlantData]
  searchRecords(id: String!): SearchRecord
}
