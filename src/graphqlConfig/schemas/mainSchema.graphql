enum SearchRecordStatus {
  READY
  SCRAPING
  COMPLETE
}

enum LocationType {
  MAP
  CUSTOM
}

type SearchRecord {
  _id: ObjectId!
  createdTimestamp: Float!
  status: SearchRecordStatus!
  statusUpdatedTimestamp: Float!

  boundingPolyCoords: [[[Float!]!]!]!
  scientificName: String
  commonName: String

  locationName: String!
  taxonKeys: [Int!]

  totalOccurrences: Int!
  occurrencesOffset: Int!
}

enum SearchRecordSortField {
  createdTimestamp
  statusUpdatedTimestamp
  status
}

input SearchRecordSortInput {
  field: SearchRecordSortField!
  direction: Int!
}

type SearchRecordQueryResults {
  count: Float!
  results: [SearchRecord!]!
}

type Query {
  searchRecord(id: String!): SearchRecord
  allSearchRecords(
    sort: [SearchRecordSortInput!]
    limit: Int
    offset: Int
  ): SearchRecordQueryResults!
}
