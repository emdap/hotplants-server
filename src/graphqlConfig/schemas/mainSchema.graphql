enum SearchRecordStatus {
  READY
  SCRAPING
  COMPLETE
}

enum LocationSource {
  custom
  search
}

type SearchRecord {
  _id: ObjectId!
  createdTimestamp: Float!
  status: SearchRecordStatus!
  lastRanTimestamp: Float

  locationName: String
  locationSource: LocationSource
  boundingPolyCoords: [[[Float!]!]!]
  scientificName: String
  commonName: String

  taxonKeys: [Int!]

  totalOccurrences: Int!
  occurrencesOffset: Int!

  userIds: [ObjectId!]
}

enum SearchRecordSortField {
  createdTimestamp
  lastRanTimestamp
  totalOccurrences
  locationName
}

input SearchRecordSortInput {
  field: SearchRecordSortField!
  value: Int!
}

enum SearchRecordBooleanFilterField {
  commonName
  scientificName
  userSearch
}

input SearchRecordBooleanFilterInput {
  field: SearchRecordBooleanFilterField!
  value: Boolean!
}

enum SearchRecordStringFilterField {
  locationSource
  status
}

input SearchRecordStringFilterInput {
  field: SearchRecordStringFilterField!
  value: [String!]!
}

type SearchRecordQueryResults {
  count: Float!
  results: [SearchRecord!]!
}

# Excerpt from PlantData
type PlantDataExcerpt {
  _id: String!
  occurrenceId: Float!
  thumbnailUrl: String
  url: String!
  isProxyUrl: Boolean
}

type SearchRecordPlantCountResults {
  plantCount: Float!
  occurrenceCount: Float!
  firstPlant: PlantDataExcerpt
}

type Query {
  searchRecord(id: String!): SearchRecord
  searchRecordDataCounts(id: String!): SearchRecordPlantCountResults!
  allSearchRecords(
    sort: [SearchRecordSortInput!]
    booleanFilter: [SearchRecordBooleanFilterInput!]
    stringFilter: [SearchRecordStringFilterInput!]
    limit: Int
    offset: Int
  ): SearchRecordQueryResults!
}
